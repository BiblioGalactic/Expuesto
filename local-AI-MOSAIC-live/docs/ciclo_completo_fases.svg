<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Ciclo completo de MOSAIC: FASE 0 a 5 con el pipeline de dos máquinas</title>
  <desc>FASE 0 asegura cluster y mini; FASE 1 las fuentes (oráculo, silo, fábrica) llenan la cola con presupuesto; FASE 2 ingesta en pipeline (un mediano ejecuta mientras el mini juzga; el 24B jamás); FASE 3 tribunal adversarial; FASE 4 aprender (generar huecos y consolidar); FASE 5 panel y planta de reciclaje. Cada fase tiene su color, igual que en la terminal.</desc>
  <style>
    .t{fill:#222;font-weight:700}.s{fill:#222;fill-opacity:.66}
    .arr{stroke:#222;stroke-opacity:.45;fill:none}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#222" fill-opacity=".5"/></marker></defs>
  <text x="450" y="26" text-anchor="middle" class="t" font-size="15">El ciclo, por fases (PIPELINE=1 ./mosaic.sh ciclo)</text>

  <!-- 6 fases en fila, color por fase -->
  <g font-size="11">
    <!-- F0 cyan -->
    <rect x="14"  y="60" width="135" height="92" rx="9" fill="#36c" fill-opacity=".08" stroke="#3b82c4" stroke-opacity=".9"/>
    <text class="t" x="81" y="84" text-anchor="middle">FASE 0 · infra</text>
    <text class="s" x="81" y="104" text-anchor="middle">cluster + mini</text>
    <text class="s" x="81" y="120" text-anchor="middle">juez → mini</text>
    <!-- F1 verde -->
    <rect x="158" y="60" width="135" height="92" rx="9" fill="#2f9e7f" fill-opacity=".09" stroke="#2f9e7f" stroke-opacity=".9"/>
    <text class="t" x="225" y="84" text-anchor="middle">FASE 1 · fuentes</text>
    <text class="s" x="225" y="104" text-anchor="middle">oráculo·silo·fábrica</text>
    <text class="s" x="225" y="120" text-anchor="middle">→ cola (presupuesto)</text>
    <!-- F2 azul -->
    <rect x="302" y="60" width="135" height="92" rx="9" fill="#3b82c4" fill-opacity=".09" stroke="#3b82c4" stroke-opacity=".95"/>
    <text class="t" x="369" y="84" text-anchor="middle">FASE 2 · ingesta</text>
    <text class="s" x="369" y="104" text-anchor="middle">PIPELINE</text>
    <text class="s" x="369" y="120" text-anchor="middle">mediano ‖ mini juzga</text>
    <!-- F3 magenta -->
    <rect x="446" y="60" width="135" height="92" rx="9" fill="#a23bbf" fill-opacity=".08" stroke="#a23bbf" stroke-opacity=".85"/>
    <text class="t" x="513" y="84" text-anchor="middle">FASE 3 · juicio</text>
    <text class="s" x="513" y="104" text-anchor="middle">tribunal</text>
    <text class="s" x="513" y="120" text-anchor="middle">adversarial</text>
    <!-- F4 amarillo -->
    <rect x="590" y="60" width="135" height="92" rx="9" fill="#d98a2b" fill-opacity=".1" stroke="#d98a2b" stroke-opacity=".9"/>
    <text class="t" x="657" y="84" text-anchor="middle">FASE 4 · aprender</text>
    <text class="s" x="657" y="104" text-anchor="middle">generar huecos</text>
    <text class="s" x="657" y="120" text-anchor="middle">+ consolidar</text>
    <!-- F5 cyan -->
    <rect x="734" y="60" width="152" height="92" rx="9" fill="#36c" fill-opacity=".08" stroke="#3b82c4" stroke-opacity=".9"/>
    <text class="t" x="810" y="84" text-anchor="middle">FASE 5 · panel</text>
    <text class="s" x="810" y="104" text-anchor="middle">META + madurez</text>
    <text class="s" x="810" y="120" text-anchor="middle">+ planta (recicla)</text>
  </g>
  <g class="arr" stroke-width="1.6">
    <path d="M149,106 L156,106" marker-end="url(#a)"/>
    <path d="M293,106 L300,106" marker-end="url(#a)"/>
    <path d="M437,106 L444,106" marker-end="url(#a)"/>
    <path d="M581,106 L588,106" marker-end="url(#a)"/>
    <path d="M725,106 L732,106" marker-end="url(#a)"/>
  </g>
  <!-- bucle de vuelta -->
  <path class="arr" stroke-width="1.4" stroke-dasharray="5 4" d="M810,154 C810,210 450,210 225,210 C140,210 90,180 81,156" marker-end="url(#a)"/>
  <text class="s" x="450" y="226" text-anchor="middle" font-size="11">repite por tandas · el estado (capacidades, Elo, dignidad) es acumulativo</text>

  <!-- nota dos máquinas -->
  <text class="s" x="450" y="290" text-anchor="middle" font-size="11.5">🧠 MacBook (medianos generan, fábrica, oráculo)   ‖   🧠 Mac mini (juzga, tribunal, A/B) — los dos a la vez en FASE 2</text>
</svg>
