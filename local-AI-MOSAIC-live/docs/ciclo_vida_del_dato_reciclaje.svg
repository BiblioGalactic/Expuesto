  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:ui-sans-serif, system-ui, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ciclo de vida del dato con metáfora de reciclaje y temperaturas hot/warm/cold</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:ui-sans-serif, system-ui, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">La materia prima (repo/documento, enorme) pasa por el centro de reciclaje, que extrae el valor destilado (capacidad, nota — chico) a la zona caliente y manda el bulto a frío o a la basura. El camión comprime y mueve de caliente a templado a frío por tamaño y edad. El barrendero limpia la basura de cada ciclo.</desc>
  
