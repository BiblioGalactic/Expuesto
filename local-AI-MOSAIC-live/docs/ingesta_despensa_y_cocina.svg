  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:ui-sans-serif, system-ui, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Las fuentes llenan una despensa barata (red/IO, solapable, con presupuesto por fuente); de ahí pasa a una cola con tope; y la cocina (GPU) procesa en serie, una cosa a la vez. Si la cola está llena, no se pide más (backpressure).</desc>
  
